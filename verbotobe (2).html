<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes">
  <title>📱 Verbo TO BE · ser y estar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0f3b5e, #18638c);
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 20px 12px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #e7f3ff;
    }

    .app-container {
      max-width: 550px;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 48px 48px 32px 32px;
      padding: 25px 18px;
      border: 2px solid #60b0f0;
      box-shadow: 0 20px 35px rgba(0,0,0,0.6);
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 500;
      color: #fcee9f;
      text-shadow: 0 4px 0 #9e7720;
      margin-bottom: 8px;
      padding-left: 15px;
    }

    .sub {
      font-size: 1.1rem;
      color: #c7e6ff;
      margin-bottom: 30px;
      padding-left: 18px;
      border-left: 5px solid #ffb547;
    }

    .verb-list {
      display: flex;
      flex-direction: column;
      gap: 30px;
      margin: 20px 0 35px;
    }

    .verb-card {
      background: #1f5378;
      border-radius: 42px;
      padding: 22px 20px 25px;
      border: 3px solid #8fc9ff;
      box-shadow: 0 12px 0 #0e3752, 0 8px 15px black;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .pronoun-title {
      font-size: 2.8rem;
      font-weight: 800;
      color: #fceb9c;
      text-shadow: 0 5px 0 #a57c28;
      line-height: 1;
    }

    .verb-form {
      font-size: 2.5rem;
      font-weight: 700;
      color: #b9e6ff;
      background: #1d4f73;
      padding: 0 15px;
      border-radius: 60px;
      border: 2px solid #ffb347;
      box-shadow: 0 4px 0 #0f3550;
    }

    .audio-badge {
      background: #357eb0;
      border: none;
      border-radius: 60px;
      width: 60px;
      height: 60px;
      font-size: 2.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 0 #19415a;
      transition: 0.08s;
      color: white;
    }

    .audio-badge:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #19415a;
    }

    .desc {
      background: #17466b;
      border-radius: 24px;
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 1.1rem;
      color: #e2f0ff;
      border-left: 6px solid #ffb347;
    }

    .examples-section {
      background: #1b3f5c;
      border-radius: 30px;
      padding: 18px 15px;
      margin: 18px 0;
      border: 2px dashed #7cb9e8;
    }

    .examples-title {
      font-weight: 600;
      color: #ffda88;
      margin-bottom: 12px;
      font-size: 1.2rem;
    }

    .example-item {
      display: flex;
      flex-direction: column;
      background: #2c628b;
      border-radius: 28px;
      padding: 14px 16px;
      margin-bottom: 12px;
      border: 2px solid #95c8f0;
    }

    .example-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .example-text {
      font-size: 1.2rem;
      font-weight: 500;
      color: #fdf6e3;
      flex: 1;
    }

    .example-text strong {
      color: #ffdb7c;
      font-size: 1.4rem;
    }

    .example-translation {
      color: #cfe3ff;
      font-size: 1rem;
      margin-top: 8px;
      padding-left: 10px;
      border-left: 3px solid #ffb547;
      font-style: italic;
    }

    .audio-mini {
      background: #3f7fb3;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: 0 4px 0 #1f4763;
      transition: 0.08s;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .audio-mini:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 #1f4763;
    }

    .writing-practice {
      background: #123b57;
      border-radius: 32px;
      padding: 20px;
      margin: 20px 0 5px;
      border: 2px solid #f4cda6;
    }

    .phrase-title {
      font-size: 1.2rem;
      color: #ffda88;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .long-phrase {
      background: #0e3147;
      padding: 18px 15px;
      border-radius: 30px;
      font-size: 1.25rem;
      color: #fcf0d5;
      margin-bottom: 10px;
      border: 2px solid #ffb347;
      text-align: center;
      word-break: break-word;
    }

    .phrase-translation {
      background: #15455e;
      border-radius: 20px;
      padding: 12px 15px;
      margin-bottom: 15px;
      color: #ddf2ff;
      font-style: italic;
      text-align: center;
      border-left: 6px solid #7cb9e8;
    }

    .phrase-audio-btn {
      background: #3f7fb3;
      border: none;
      border-radius: 40px;
      padding: 10px 20px;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 4px 0 #1f4763;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .phrase-audio-btn:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 #1f4763;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .writing-input {
      width: 100%;
      padding: 16px 18px;
      border: none;
      border-radius: 60px;
      background: #ebf7ff;
      font-size: 1.1rem;
      text-align: left;
      border: 3px solid #5fa7d9;
      outline: none;
    }

    .writing-input:focus {
      border-color: #f7c35c;
    }

    .check-btn {
      background: #f7b32b;
      border: none;
      border-radius: 60px;
      padding: 16px 20px;
      font-weight: 700;
      font-size: 1.2rem;
      color: #00263b;
      cursor: pointer;
      box-shadow: 0 6px 0 #b87e1a;
      transition: 0.1s;
    }

    .check-btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #b87e1a;
    }

    .feedback-message {
      margin-top: 18px;
      padding: 14px;
      border-radius: 28px;
      background: #1f4b6e;
      color: #ddf2ff;
      font-size: 1rem;
      border-left: 8px solid;
    }

    .correct-fb { border-color: #6ec06e; background: #1f5f4c; }
    .incorrect-fb { border-color: #e67a7a; background: #632f2f; }

    .exit-button {
      display: flex;
      justify-content: center;
      margin: 20px 0 10px;
    }

    .exit-btn {
      background: #a54545;
      border: none;
      border-radius: 60px;
      padding: 16px 45px;
      font-size: 1.4rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 0 #632b2b;
      transition: 0.1s;
      border: 2px solid #ffa2a2;
    }

    .exit-btn:active {
      transform: translateY(7px);
      box-shadow: 0 1px 0 #632b2b;
    }

    .footer-note {
      text-align: center;
      color: #aaccee;
      margin-top: 15px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1>🔷 verbo TO BE · ser/estar</h1>
  <div class="sub">conjugación, ejemplos y práctica con traducción</div>

  <div id="verbList" class="verb-list"></div>

  <div class="exit-button">
    <button class="exit-btn" id="exitBtn">✕ terminar</button>
  </div>
  <div class="footer-note">cada frase tiene audio · incluye traducción al español</div>
</div>

<script>
  // Base de datos para el verbo to be (ser/estar)
  const toBeData = [
    {
      pronoun: "I",
      form: "am",
      desc: "Primera persona singular. 'Yo soy' o 'yo estoy'.",
      examples: [
        { en: "I am a student.", es: "Yo soy estudiante." },
        { en: "I am tired.", es: "Estoy cansado." },
        { en: "I am here.", es: "Estoy aquí." }
      ],
      longPhrase: {
        en: "I am happy because I am with my friends. I am not alone.",
        es: "Estoy feliz porque estoy con mis amigos. No estoy solo."
      }
    },
    {
      pronoun: "You",
      form: "are",
      desc: "Segunda persona singular y plural. 'Tú eres/estás', 'vosotros sois/estáis', 'usted es/está'.",
      examples: [
        { en: "You are my friend.", es: "Eres mi amigo." },
        { en: "You are late.", es: "Estás tarde." },
        { en: "You are beautiful.", es: "Eres hermoso/hermosa." }
      ],
      longPhrase: {
        en: "You are always kind. You are never rude. You are a good person.",
        es: "Siempre eres amable. Nunca eres grosero. Eres una buena persona."
      }
    },
    {
      pronoun: "He",
      form: "is",
      desc: "Tercera persona masculino singular. 'Él es/está'.",
      examples: [
        { en: "He is a doctor.", es: "Él es doctor." },
        { en: "He is tall.", es: "Él es alto." },
        { en: "He is at home.", es: "Él está en casa." }
      ],
      longPhrase: {
        en: "He is my brother. He is very smart, and he is always busy.",
        es: "Él es mi hermano. Es muy inteligente y siempre está ocupado."
      }
    },
    {
      pronoun: "She",
      form: "is",
      desc: "Tercera persona femenino singular. 'Ella es/está'.",
      examples: [
        { en: "She is a teacher.", es: "Ella es maestra." },
        { en: "She is happy.", es: "Ella está feliz." },
        { en: "She is from Spain.", es: "Ella es de España." }
      ],
      longPhrase: {
        en: "She is my sister. She is kind, and she is very creative.",
        es: "Ella es mi hermana. Es amable y es muy creativa."
      }
    },
    {
      pronoun: "It",
      form: "is",
      desc: "Tercera persona neutro singular. Objetos, animales, ideas. 'Ello es/está'.",
      examples: [
        { en: "It is a cat.", es: "Es un gato." },
        { en: "It is cold today.", es: "Hace frío hoy." },
        { en: "It is interesting.", es: "Es interesante." }
      ],
      longPhrase: {
        en: "It is a beautiful day. It is sunny, and it is warm outside.",
        es: "Es un día hermoso. Hace sol y hace calor afuera."
      }
    },
    {
      pronoun: "We",
      form: "are",
      desc: "Primera persona plural. 'Nosotros somos/estamos'.",
      examples: [
        { en: "We are friends.", es: "Somos amigos." },
        { en: "We are tired.", es: "Estamos cansados." },
        { en: "We are in the park.", es: "Estamos en el parque." }
      ],
      longPhrase: {
        en: "We are a team. We are strong, and we are ready to win.",
        es: "Somos un equipo. Somos fuertes y estamos listos para ganar."
      }
    },
    {
      pronoun: "They",
      form: "are",
      desc: "Tercera persona plural. 'Ellos/ellas son/están'.",
      examples: [
        { en: "They are students.", es: "Ellos son estudiantes." },
        { en: "They are happy.", es: "Ellos están felices." },
        { en: "They are from Colombia.", es: "Ellos son de Colombia." }
      ],
      longPhrase: {
        en: "They are my parents. They are loving and they are supportive.",
        es: "Ellos son mis padres. Son cariñosos y son solidarios."
      }
    },
    
  ];

  // Función para reproducir con síntesis de voz
  function speakText(text) {
    if (!window.speechSynthesis) {
      alert('Tu navegador no soporta síntesis de voz.');
      return;
    }
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.9;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
  }

  // Renderizar todas las tarjetas
  function renderVerbs() {
    const container = document.getElementById('verbList');
    let html = '';

    toBeData.forEach((item, idx) => {
      // Ejemplos con traducción
      let examplesHtml = '';
      item.examples.forEach(ex => {
        examplesHtml += `
          <div class="example-item">
            <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
              <span class="example-text"><strong>${item.pronoun}</strong> ${ex.en.substring(item.pronoun.length).trim()}</span>
              <button class="audio-mini" data-text="${ex.en}" aria-label="escuchar ejemplo">🔊</button>
            </div>
            <div class="example-translation">${ex.es}</div>
          </div>
        `;
      });

      html += `
        <div class="verb-card" id="card-${idx}">
          <div class="card-header">
            <span class="pronoun-title">${item.pronoun}</span>
            <span class="verb-form">${item.form}</span>
            <button class="audio-badge" data-text="${item.pronoun} ${item.form}" aria-label="reproducir pronunciación">🔊</button>
          </div>
          <div class="desc">${item.desc}</div>
          <div class="examples-section">
            <div class="examples-title">📘 frases cotidianas</div>
            ${examplesHtml}
          </div>
          <div class="writing-practice">
            <div class="phrase-title">
              <span>📝 frase para escribir</span>
              <button class="phrase-audio-btn" data-text="${item.longPhrase.en}">🔊 escuchar inglés</button>
            </div>
            <div class="long-phrase">${item.longPhrase.en}</div>
            <div class="phrase-translation">${item.longPhrase.es}</div>
            <div class="input-group">
              <input type="text" class="writing-input" id="input-${idx}" placeholder="Escribe la frase en inglés..." autocomplete="off">
              <button class="check-btn" data-idx="${idx}" data-correct="${item.longPhrase.en}">comprobar</button>
            </div>
            <div class="feedback-message" id="fb-${idx}"></div>
          </div>
        </div>
      `;
    });

    container.innerHTML = html;

    // Asignar eventos a todos los botones de audio
    document.querySelectorAll('.audio-badge, .audio-mini, .phrase-audio-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const text = this.dataset.text;
        if (text) speakText(text);
      });
    });

    // Asignar eventos a los botones de comprobación
    document.querySelectorAll('.check-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const idx = this.dataset.idx;
        const correctPhrase = this.dataset.correct;
        const input = document.getElementById('input-'+idx);
        const userText = input.value.trim();
        const fbDiv = document.getElementById('fb-'+idx);

        if (!userText) {
          fbDiv.innerHTML = '✏️ Escribe la frase para practicar.';
          fbDiv.className = 'feedback-message incorrect-fb';
          return;
        }

        // Comparación: ignorar espacios múltiples y mayúsculas
        const normalize = (s) => s.replace(/\s+/g, ' ').trim().toLowerCase();
        const isCorrect = normalize(userText) === normalize(correctPhrase);

        if (isCorrect) {
          fbDiv.innerHTML = '✅ ¡Perfecto! Has escrito la frase correctamente.';
          fbDiv.className = 'feedback-message correct-fb';
        } else {
          fbDiv.innerHTML = `❌ No coincide. Sigue practicando. La frase correcta es: "${correctPhrase}"`;
          fbDiv.className = 'feedback-message incorrect-fb';
        }
      });
    });
  }

  // Botón de salir
  function setupExit() {
    document.getElementById('exitBtn').addEventListener('click', function() {
      if (confirm('¿Finalizar la práctica? Volverás al inicio.')) {
        document.body.innerHTML = `
          <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a3b55; color: white; font-size: 2rem; text-align: center; padding: 20px;">
            🌟 Sesión terminada. ¡Sigue practicando!
          </div>
        `;
      }
    });
  }

  window.onload = function() {
    renderVerbs();
    setupExit();
  };
</script>
</body>
</html>
